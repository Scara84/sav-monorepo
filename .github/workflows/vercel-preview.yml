name: Vercel Preview Deploy

# Bypass du webhook natif GitHub↔Vercel (cassé au niveau projet suite au rename
# interface-admin → refonte-phase-2). On déploie manuellement via le CLI Vercel
# sur chaque push (sauf main, qui est géré par le hook production natif).

on:
  push:
    branches-ignore:
      - main

concurrency:
  # Annule les deploys précédents d'une même branche (évite les doublons).
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel preview env
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt artifact
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Comment commit with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Vercel Preview deployed**\n\n- Branch: \`${branch}\`\n- Commit: \`${sha}\`\n- URL: ${url}`,
            });
