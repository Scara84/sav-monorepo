name: Vercel Preview Deploy

# Bypass du webhook GitHub↔Vercel natif (cassé au niveau projet suite au rename
# interface-admin → refonte-phase-2 — symptôme : jobs hook en queue PENDING
# jamais traités, live:false sur get_project). Utilise l'action Amondnet qui
# wrap le CLI Vercel de manière plus robuste que des appels bruts.

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel (preview)
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          # Le projet Vercel a son Root Directory configuré sur `client/`.
          # On passe donc `working-directory: ./client` pour que l'action y pointe.
          working-directory: ./client

      - name: Comment commit with preview URL
        if: steps.deploy.outputs.preview-url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.preview-url }}';
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Vercel Preview deployed**\n\n- Branch: \`${branch}\`\n- Commit: \`${sha}\`\n- URL: ${url}`,
            });
