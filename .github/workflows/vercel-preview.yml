name: Vercel Preview Deploy

# Bypass du webhook GitHub↔Vercel natif (resté bloqué après rename branche +
# cron horaire rejeté Hobby, cf. commit 5aa138f). On déploie via CLI Vercel
# direct dans un workflow contrôlé.

on:
  push:
    branches-ignore:
      - main

concurrency:
  group: vercel-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Deploy preview to Vercel
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Pas de `working-directory: client` : le Root Directory est configuré au niveau
    # du projet Vercel (prj_xxx pointe sur `client/`). Le CLI doit être invoqué
    # depuis la racine du repo pour que Vercel résolve le Root Directory lui-même.

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI (latest — Vercel API requires ≥ 47.2.2)
        run: npm install --global vercel@latest

      # On délègue le build à l'infra Vercel (pas de `vercel build` local +
      # `--prebuilt`) pour éviter un bug `spawn sh ENOENT` du CLI dans l'env
      # GitHub Actions quand il spawne les subprocess installCommand/buildCommand.
      # Trade-off : upload du workspace complet au lieu d'un artifact prebuild.
      - name: Deploy to Vercel (preview, remote build)
        id: deploy
        run: |
          url=$(vercel deploy --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $url"

      - name: Comment commit with preview URL
        if: steps.deploy.outputs.url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.sha.substring(0, 7);
            const branch = context.ref.replace('refs/heads/', '');
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `🚀 **Vercel Preview deployed**\n\n- Branch: \`${branch}\`\n- Commit: \`${sha}\`\n- URL: ${url}`,
            });
